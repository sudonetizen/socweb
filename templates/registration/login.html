{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <h1>Login</h1>
    {% if form.errors %}
        <p>
            Your username and passwrod didnt' match.
            Please try again.
        </p>
    {% else %}
        <p>Please, user the following form to login:</p>
    {% endif %}

    <div class="login-form">
        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="hidden" name="next" value="{{ next }}" />
            <p><input type="submit" value="Login"></p>
        </form>
    </div>
{% endblock %}
